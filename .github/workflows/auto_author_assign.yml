# https://github.com/marketplace/actions/auto-author-assign
name: 'Auto Author Assign'

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  assign-author:
    runs-on: ubuntu-latest
    steps:
      - uses: toshimaru/auto-author-assign@8d6ad479fdab8dcf896d6f41db22fc51549dc8de # v1.3.4
